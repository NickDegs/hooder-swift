name: Hooder
options:
  bundleIdPrefix: app.realvirtuality
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Release

configs:
  Debug:   debug
  Release: release

settings:
  base:
    SWIFT_VERSION:              "5.10"
    MARKETING_VERSION:          "1.0.0"
    CURRENT_PROJECT_VERSION:    "1"
    ENABLE_BITCODE:             NO
    ONLY_ACTIVE_ARCH:           NO
    ARCHS:                      arm64
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY:     "1,2"
    SWIFT_COMPILATION_MODE:     wholemodule
    GCC_OPTIMIZATION_LEVEL:     s
    DEBUG_INFORMATION_FORMAT:   dwarf-with-dsym

targets:
  Hooder:
    type:     application
    platform: iOS
    sources:
      - path: Hooder
        excludes:
          - "**/.DS_Store"
    resources:
      - Hooder/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER:    app.realvirtuality.landlord
        DEVELOPMENT_TEAM:             AC4KJAUPL4
        INFOPLIST_FILE:               Hooder/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS:       Hooder/Resources/Hooder.entitlements
        TARGETED_DEVICE_FAMILY:       "1,2"
        MAPBOX_TOKEN:                 ""
      configs:
        Debug:
          CODE_SIGN_STYLE:    Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_STYLE:          Manual
          CODE_SIGN_IDENTITY:       "Apple Distribution"
          PROVISIONING_PROFILE_APP: ""
    dependencies:
      - package: MapboxMaps
    scheme:
      testTargets:        []
      gatherCoverageData: false
      environmentVariables: {}

packages:
  MapboxMaps:
    url:  https://github.com/mapbox/mapbox-maps-ios
    from: "11.0.0"
